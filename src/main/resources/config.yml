# Allow hoppers placed above a machine (facing down) to insert fuel/inputs, and hoppers
# placed below a machine to extract its output. Toggled live by /zmachines reload.
Hoppers: true
# Machine block — set ONE block per tier (Tier1/Tier2/Tier3). Each value is either a vanilla
# material (e.g. FURNACE) or a Nexo block ID (nexo:<id>). Any placed block whose value matches
# here becomes a machine — this also works for blocks placed by WorldEdit (e.g. a prebuilt
# starter base): right-click it once to activate the machine.
#
# There is NO fallback: every tier you want usable must name a block, and the Nexo id must match
# exactly. An unconfigured or misspelled tier simply won't become a machine (it stays a plain
# block, and /zmachines give reports an error) instead of silently turning into a default block.
#
# Give command: /zmachines give <player> <type> <tier> [amount]
# Example (per-tier Nexo blocks):
#   GrowingMachine:
#     ItemStack:
#       Tier1: "nexo:growing_machine_1"
#       Tier2: "nexo:growing_machine_2"
#       Tier3: "nexo:growing_machine_3"
RubbleProcessor:
  Name: "<gold>Rubble Processor"
  ItemStack:
    ItemVersion: '2.0'
    Display: "<machine>"
    Lore:
    - ""
    - "<gray>This machine processes various materials"
    - "<gray>into <yellow>different</yellow> ones"
    - ""
    - "<red>Uses fuel"
    Tier1: "FURNACE"
    Tier2: "FURNACE"
    Tier3: "FURNACE"
GrowingMachine:
  Name: "<gold>Growing Machine"
  ItemStack:
    ItemVersion: '2.0'
    Display: "<machine>"
    Lore:
    - ""
    - "<gray>This machine grows various seeds"
    - "<gray>into their <yellow>harvestable</yellow> state"
    - ""
    - "<red>Uses fuel"
    Tier1: "COMPOSTER"
    Tier2: "COMPOSTER"
    Tier3: "COMPOSTER"
CraftingMachine:
  Name: "<gold>Crafting Machine"
  ItemStack:
    ItemVersion: '2.0'
    Display: "<machine>"
    Lore:
    - ""
    - "<gray>Crafts custom items from a list"
    - "<gray>of configured recipes"
    - ""
    - "<red>Uses fuel"
    Tier1: "MAGENTA_CONCRETE"
    Tier2: "MAGENTA_CONCRETE"
    Tier3: "MAGENTA_CONCRETE"
Recipes:
  RubbleProcessor:
    # Accepts any block tagged BASE_STONE_OVERWORLD in all 4 input slots.
    # Consumes 1 from each slot per cycle and produces 1 Output.
    # Tier 2 runs 1.2x faster than tier 1; tier 3 runs 1.2x faster than tier 2.
    BaseRate: 4.0
    Output: "DIRT:1"
  GrowingMachine:
    # Named recipes — one per seed type. Seeds are NOT consumed (matches vanilla farming).
    pumpkin:
      BaseRate: 30.0
      Input: "PUMPKIN_SEEDS"
      Output: "PUMPKIN:1"
    melon:
      BaseRate: 35.0
      Input: "MELON_SEEDS"
      Output: "MELON:1"
  CraftingMachine:
    # Recipes for the Crafting Machine.
    # Order  — controls position in the recipe list (1 = first slot, 2 = next, etc.)
    # Inputs — sum across the 6 input slots; player can split items across slots in any order
    # Output — supports vanilla ("DIRT:1") or Nexo ("nexo:rifle:1") format
    iron_sword:
      Order: 1
      BaseRate: 30.0
      Inputs:
      - "IRON_INGOT:2"
      - "STICK:1"
      Output: "IRON_SWORD:1"
    iron_pickaxe:
      Order: 2
      BaseRate: 45.0
      Inputs:
      - "IRON_INGOT:3"
      - "STICK:2"
      Output: "IRON_PICKAXE:1"
Fuel:
- "COAL:1.0"
